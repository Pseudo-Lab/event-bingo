version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - backend
    networks:
      - traefik
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bingo-frontend.rule=Host(`bingo.pseudolab-devfactory.com`)"
      - "traefik.http.routers.bingo-frontend.entrypoints=websecure"
      - "traefik.http.routers.bingo-frontend.tls.certresolver=le"
      - "traefik.http.services.bingo-frontend.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: mysql+aiomysql://${DB_ROOT}:${DB_ROOT_PASSWORD}@db:${DB_PORT}/${DB_DATABASE}
      SWAGGER_USERNAME: ${SWAGGER_USERNAME}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD}
    command: >
      /bin/sh -c "
        alembic upgrade head;
        python app/start.py
      "
    networks:
      - traefik
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bingo-backend.rule=Host(`bingo.pseudolab-devfactory.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.bingo-backend.entrypoints=websecure"
      - "traefik.http.routers.bingo-backend.tls.certresolver=le"
      - "traefik.http.services.bingo-backend.loadbalancer.server.port=8000"
      - "traefik.docker.network=traefik"

  db:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysql -u ${DB_USER} -p${DB_PASSWORD} -e 'SHOW DATABASES LIKE \"${DB_DATABASE}\";'"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  traefik:
    external: true

volumes:
  mysql-data:
