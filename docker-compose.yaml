services:
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_URL: ${DB_URL}
      SWAGGER_USERNAME: ${SWAGGER_USERNAME}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_INVITE_URL_BASE: ${ADMIN_INVITE_URL_BASE:-}
      ADMIN_SMTP_HOST: ${ADMIN_SMTP_HOST:-}
      ADMIN_SMTP_PORT: ${ADMIN_SMTP_PORT:-587}
      ADMIN_SMTP_USERNAME: ${ADMIN_SMTP_USERNAME:-}
      ADMIN_SMTP_PASSWORD: ${ADMIN_SMTP_PASSWORD:-}
      ADMIN_SMTP_FROM_EMAIL: ${ADMIN_SMTP_FROM_EMAIL:-}
    command: >
      /bin/sh -c "
        alembic upgrade head &&
        python app/start.py
      "
    ports:
      - "${BACKEND_PORT:-8000}:8000"
