services:
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
        - VITE_TEST_MODE=${VITE_TEST_MODE:-false}
        - VITE_APP_VERSION=${VITE_APP_VERSION:-}
        - VITE_GIT_SHA=${VITE_GIT_SHA:-}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ENV: ${ENV:-development}
      DB_URL: ${DB_URL}
      SWAGGER_USERNAME: ${SWAGGER_USERNAME}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_CONSOLE_URL_BASE: ${ADMIN_CONSOLE_URL_BASE:-http://localhost/admin}
      ADMIN_INVITE_TOKEN_EXPIRE_HOURS: ${ADMIN_INVITE_TOKEN_EXPIRE_HOURS:-72}
      ADMIN_INVITE_URL_BASE: ${ADMIN_INVITE_URL_BASE:-http://localhost/admin/invite}
      ADMIN_SMTP_HOST: ${ADMIN_SMTP_HOST:-}
      ADMIN_SMTP_PORT: ${ADMIN_SMTP_PORT:-587}
      ADMIN_SMTP_USERNAME: ${ADMIN_SMTP_USERNAME:-}
      ADMIN_SMTP_PASSWORD: ${ADMIN_SMTP_PASSWORD:-}
      ADMIN_SMTP_FROM_EMAIL: ${ADMIN_SMTP_FROM_EMAIL:-}
      ADMIN_SMTP_FROM_NAME: ${ADMIN_SMTP_FROM_NAME:-DevFactory 운영팀}
      ADMIN_SMTP_REPLY_TO: ${ADMIN_SMTP_REPLY_TO:-}
      ADMIN_SMTP_USE_TLS: ${ADMIN_SMTP_USE_TLS:-true}
      ADMIN_SMTP_USE_SSL: ${ADMIN_SMTP_USE_SSL:-false}
      PRIVACY_PERSONAL_DATA_RETENTION_DAYS: ${PRIVACY_PERSONAL_DATA_RETENTION_DAYS:-365}
      PRIVACY_REDACTION_RUN_ON_STARTUP: ${PRIVACY_REDACTION_RUN_ON_STARTUP:-false}
      EVENT_SLUG_SALT: ${EVENT_SLUG_SALT:-event-bingo-auto-slug}
      PUBLIC_SITE_ORIGIN: ${PUBLIC_SITE_ORIGIN:-http://localhost}
      PUBLIC_OG_IMAGE_URL: ${PUBLIC_OG_IMAGE_URL:-http://localhost/images/hero-networking.jpg}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://frontend}
      FRONTEND_INDEX_URL: ${FRONTEND_INDEX_URL:-http://frontend/}
    command: >
      /bin/sh -c "
        alembic upgrade head &&
        python app/start.py
      "
    ports:
      - "${BACKEND_PORT:-8000}:8000"
