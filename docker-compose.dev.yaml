services:
  frontend:
    build:
      context: ./frontend
      target: build            # 빌드 스테이지만 사용 (node 환경)
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    environment:
      - VITE_DEV_API_PROXY_TARGET=http://backend:8000
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    working_dir: /app
    command: npm run dev
    ports:
      - "${DEV_FRONTEND_PORT:-3001}:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_URL: ${DB_URL:?set in .env}
      SWAGGER_USERNAME: ${SWAGGER_USERNAME:?set in .env}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD:?set in .env}
      SUPABASE_URL: ${SUPABASE_URL:?set in .env}
      SUPABASE_KEY: ${SUPABASE_KEY:?set in .env}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      ADMIN_SMTP_HOST: ${ADMIN_SMTP_HOST:-}
      ADMIN_SMTP_PORT: ${ADMIN_SMTP_PORT:-587}
      ADMIN_SMTP_USERNAME: ${ADMIN_SMTP_USERNAME:-}
      ADMIN_SMTP_PASSWORD: ${ADMIN_SMTP_PASSWORD:-}
      ADMIN_SMTP_FROM_EMAIL: ${ADMIN_SMTP_FROM_EMAIL:-}
      ADMIN_SMTP_FROM_NAME: ${ADMIN_SMTP_FROM_NAME:-DevFactory 운영팀}
      ADMIN_SMTP_REPLY_TO: ${ADMIN_SMTP_REPLY_TO:-}
      ADMIN_SMTP_USE_TLS: ${ADMIN_SMTP_USE_TLS:-true}
      ADMIN_SMTP_USE_SSL: ${ADMIN_SMTP_USE_SSL:-false}
    command: >
      /bin/sh -c "
        cd /app &&
        alembic upgrade head &&
        cd /app/app &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "
    ports:
      - "${DEV_BACKEND_PORT:-8001}:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations
      - ./.env:/app/app/config/.env:ro
