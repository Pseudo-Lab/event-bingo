version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      target: build            # 빌드 스테이지만 사용 (node 환경)
      args:
        - VITE_API_URL=http://localhost:8000
    environment:
      - VITE_API_URL=http://localhost:8000
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: mysql+aiomysql://${DB_ROOT:?set in .env}:${DB_ROOT_PASSWORD:?set in .env}@db:3306/${DB_DATABASE:-bingo_db}
      SWAGGER_USERNAME: ${SWAGGER_USERNAME:?set in .env}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD:?set in .env}
    command: >
      /bin/sh -c "
        alembic upgrade head;
        python app/start.py
      "
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations

  db:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?set in .env}
      MYSQL_USER: ${DB_USER:-bingo_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set in .env}
      MYSQL_DATABASE: ${DB_DATABASE:-bingo_db}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data-dev:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysql -u ${DB_USER:-bingo_user} -p${DB_PASSWORD:?set in .env} -e 'SHOW DATABASES LIKE \"${DB_DATABASE:-bingo_db}\";'"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data-dev:
