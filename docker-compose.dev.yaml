services:
  frontend:
    build:
      context: ./frontend
      target: build            # 빌드 스테이지만 사용 (node 환경)
      args:
        - VITE_API_URL=http://localhost:8000
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    working_dir: /app
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_URL: ${DB_URL:?set in .env}
      SWAGGER_USERNAME: ${SWAGGER_USERNAME:?set in .env}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD:?set in .env}
      SUPABASE_URL: ${SUPABASE_URL:?set in .env}
      SUPABASE_KEY: ${SUPABASE_KEY:?set in .env}
    command: >
      /bin/sh -c "
        alembic upgrade head &&
        python app/start.py
      "
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations
